<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Magadh Mahila College ERP Portal</title>
<link rel="icon" href="https://pub-56b2773adb554e88a3d5fbc74f0167bc.r2.dev/branding/Magadh_Mahila_College.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div id="mmcPageLoader" class="mmc-page-loader"><div class="mmc-spinner"></div><span>Loading admin access...</span></div>

<div class="mmc-auth-wrap">
  <div class="mmc-auth-illustration">
    <div class="position-relative" style="z-index:1;max-width:480px;">
      <div class="mmc-seal lg mb-4 mmc-float"><img src="https://pub-56b2773adb554e88a3d5fbc74f0167bc.r2.dev/branding/Magadh_Mahila_College.png" alt="Magadh Mahila College logo"></div>
      <p class="mmc-eyebrow" style="color:var(--mmc-brass);">Restricted Admin URL</p>
      <h1 class="text-white fw-800 mb-3" style="font-size:34px;line-height:1.25;">Hostel Administration</h1>
      <p style="color:#c3cbe0;font-size:14.5px;">Use this page only for authorized administrative access. Admin accounts are created manually by the Super Admin.</p>
    </div>
  </div>

  <div class="mmc-auth-form-side">
    <div class="mmc-auth-card mmc-slide-up">
      <div class="text-center mb-4">
        <h4 class="fw-700 mb-1" style="color:var(--mmc-navy);">Admin Login</h4>
        <p class="mmc-eyebrow mb-0">Magadh Mahila College ERP Portal</p>
      </div>

      <div class="mmc-card mmc-card-body">
        <p class="text-secondary fs-13 mb-4">Sign in with your Super Admin-created admin username or email.</p>
        <form id="adminLoginForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Admin Username / Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
              <input type="text" class="form-control" id="adminIdentifier" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
              <input type="password" class="form-control" id="adminPwd" required>
              <button class="btn btn-ghost" type="button" data-toggle-password="#adminPwd"><i class="fa-regular fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-maroon btn-lg w-100" id="adminLoginBtn">Login to Admin Dashboard</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/common.js"></script>
<script src="../js/api.js"></script>
<script>
  document.getElementById('adminLoginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var btn = document.getElementById('adminLoginBtn');
    var original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="mmc-spinner sm" style="border-color:rgba(255,255,255,.35);border-top-color:#fff;display:inline-block;vertical-align:middle;margin-right:8px;"></span> Signing in...';
    mmcApi('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: {
        identifier: mmcNormalizeLoginIdentifier(document.getElementById('adminIdentifier').value),
        password: document.getElementById('adminPwd').value,
        role: 'admin'
      }
    })
      .then(function(data){
        mmcStoreAdminSession(data, document.getElementById('adminIdentifier').value.trim());
        window.location.href = 'dashboard.html';
      })
      .catch(function(err){
        mmcToast('Admin login failed', err.message, 'danger');
      })
      .finally(function(){
        btn.disabled = false;
        btn.innerHTML = original;
      });
  });
</script>
</body>
</html>
